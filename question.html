<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/game.js"></script>
</head>
<body>
    <h1 id="title"></h1>
    <form id="quiz">
        <div>
            <div>
            <p id="question">Loading questions</p>
            </div>
            <div>
                <div>
                    <input type="radio" id="answer1" name="answer" value="A">
                    <label for="answer1" id="answer1Label"></label>
                </div>
                <div>
                    <input type="radio" id="answer2" name="answer" value="B">
                    <label for="answer2" id="answer2Label"></label>
                </div>
                <div>
                    <input type="radio" id="answer3" name="answer" value="C">
                    <label for="answer3" id="answer3Label"></label>
                </div>
                <div>
                    <input type="radio" id="answer4" name="answer" value="D">
                    <label for="answer4" id="answer4Label"></label>
                </div>
            </div>
        </div>
        <button onclick="checkAnswer()">Answer</button>
    </form>
</body>
</html>
